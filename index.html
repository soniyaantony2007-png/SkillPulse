<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillPulse AI</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e1b4b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --accent-primary: #8e63f1;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            color: var(--text-primary);
        }

        h1,
        h2,
        h3 {
            font-family: 'Outfit';
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-link {
            color: white;
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.1);
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        .select-input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            appearance: none;
        }

        .select-input option {
            background: var(--bg-primary);
            color: white;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            color: white;
            background: var(--accent-primary);
            font-weight: 600;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .badge-match {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .badge-miss {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- PropTypes (Required by Recharts UMD) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Recharts (UMD build depends on React/ReactDOM) -->
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js" crossorigin></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = window.Recharts;

        const API_URL = 'http://127.0.0.1:8000/api';

        function Login({ setToken }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegister, setIsRegister] = useState(false);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                const ep = isRegister ? '/auth/register' : '/auth/login';

                let options = {};
                if (isRegister) {
                    options = { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) };
                } else {
                    const fd = new URLSearchParams(); fd.append('username', email); fd.append('password', password);
                    options = { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: fd };
                }

                try {
                    const res = await fetch(API_URL + ep, options);
                    const data = await res.json();
                    if (res.ok) setToken(data.access_token);
                    else setError(data.detail || 'An error occurred');
                } catch (err) { setError('Network Error. Is the backend running?'); }
                setLoading(false);
            };

            return (
                <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh' }}>
                    <form className="card" onSubmit={handleSubmit} style={{ width: 400 }}>
                        <h2 style={{ textAlign: 'center', marginBottom: '1.5rem' }}>{isRegister ? 'Create Account' : 'Welcome Back'}</h2>

                        {error && <div style={{ background: 'rgba(239, 68, 68, 0.2)', padding: '0.75rem', borderRadius: '0.5rem', marginBottom: '1rem', color: '#fca5a5' }}>{error}</div>}

                        <input className="form-input" type="email" placeholder="Email Address" onChange={e => setEmail(e.target.value)} required />
                        <input className="form-input" type="password" placeholder="Password" onChange={e => setPassword(e.target.value)} required />

                        <button className="btn" style={{ width: '100%', marginBottom: '1.5rem' }} disabled={loading}>
                            {loading ? 'Processing...' : (isRegister ? 'Register' : 'Login')}
                        </button>
                        <p style={{ cursor: 'pointer', color: 'var(--accent-primary)', textAlign: 'center', fontSize: '0.9rem' }} onClick={() => setIsRegister(!isRegister)}>
                            {isRegister ? 'Already have an account? Login' : "Don't have an account? Register"}
                        </p>
                    </form>
                </div>
            );
        }

        function Dashboard() {
            const generateJunkTrends = () => [
                { skill: "python", count: 124 },
                { skill: "sql", count: 98 },
                { skill: "react", count: 86 },
                { skill: "javascript", count: 71 },
                { skill: "aws", count: 65 },
                { skill: "docker", count: 55 }
            ];

            const generateJunkForecast = () => {
                const data = {};
                const skills = ["python", "sql", "react", "aws"];
                skills.forEach(skill => {
                    const skillData = [];
                    let baseDemand = Math.floor(Math.random() * 50) + 50;
                    for (let i = 1; i <= 12; i++) {
                        const month = new Date();
                        month.setMonth(month.getMonth() + i);
                        baseDemand += Math.floor(Math.random() * 15) - 2;
                        skillData.push({ month: month.toISOString().split('T')[0], projected: baseDemand });
                    }
                    data[skill] = skillData;
                });
                return data;
            };

            const [trends, setTrends] = useState([]);
            const [forecast, setForecast] = useState({});
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const [tRes, fRes] = await Promise.all([
                            fetch(API_URL + '/analytics/trends'),
                            fetch(API_URL + '/analytics/forecast')
                        ]);
                        let tData = [];
                        let fData = {};
                        if (tRes.ok) tData = await tRes.json();
                        if (fRes.ok) fData = await fRes.json();

                        setTrends(tData.length > 0 ? tData : generateJunkTrends());
                        setForecast(Object.keys(fData).length > 0 ? fData : generateJunkForecast());
                    } catch (e) {
                        console.error("Failed to fetch dashboard data, using junk fallback data", e);
                        setTrends(generateJunkTrends());
                        setForecast(generateJunkForecast());
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            if (loading) return <div className="loading-spinner"></div>;

            const fSkill = Object.keys(forecast)[0];

            return (
                <div style={{ animation: 'fadeIn 0.5s ease' }}>
                    <h1 style={{ marginBottom: '2rem' }}>Pulse Dashboard</h1>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(400px, 1fr))', gap: '2rem' }}>
                        <div className="card">
                            <h2 style={{ marginBottom: '1rem', fontSize: '1.25rem', color: 'var(--text-secondary)' }}>Top Demanded Skills</h2>
                            {trends.length > 0 ? (
                                <div style={{ height: 350 }}>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={trends} layout="vertical" margin={{ left: 60, right: 20 }}>
                                            <XAxis type="number" hide />
                                            <YAxis dataKey="skill" type="category" stroke="#cbd5e1" fontSize={12} tickLine={false} axisLine={false} />
                                            <Tooltip cursor={{ fill: 'rgba(255,255,255,0.05)' }} contentStyle={{ background: '#1e293b', border: 'none', borderRadius: '8px' }} />
                                            <Bar dataKey="count" fill="url(#colorBar)" radius={[0, 4, 4, 0]} barSize={24} />
                                            <defs>
                                                <linearGradient id="colorBar" x1="0" y1="0" x2="1" y2="0">
                                                    <stop offset="0%" stopColor="#6366f1" />
                                                    <stop offset="100%" stopColor="#8b5cf6" />
                                                </linearGradient>
                                            </defs>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            ) : (
                                <p style={{ color: 'gray' }}>No trend data available. Upload job listings first.</p>
                            )}
                        </div>

                        <div className="card">
                            <h2 style={{ marginBottom: '1rem', fontSize: '1.25rem', color: 'var(--text-secondary)' }}>12-Month Forecast {fSkill ? `- ${fSkill.toUpperCase()}` : ''}</h2>
                            {fSkill ? (
                                <div style={{ height: 350 }}>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={forecast[fSkill]} margin={{ left: 0, right: 20 }}>
                                            <XAxis dataKey="month" stroke="#cbd5e1" fontSize={12} tickFormatter={v => v.substring(5, 7) + '/' + v.substring(2, 4)} tickLine={false} axisLine={false} />
                                            <YAxis stroke="#cbd5e1" fontSize={12} tickLine={false} axisLine={false} />
                                            <Tooltip contentStyle={{ background: '#1e293b', border: 'none', borderRadius: '8px' }} />
                                            <Line type="monotone" dataKey="projected" stroke="#f59e0b" strokeWidth={4} dot={{ r: 4, fill: '#1e293b', strokeWidth: 2 }} activeDot={{ r: 6 }} />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            ) : <p style={{ color: 'gray' }}>No forecast data generated. Requires at least 2 consecutive months of job data per skill.</p>}
                        </div>
                    </div>
                </div>
            );
        }

        function UploadJob() {
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [msg, setMsg] = useState({ text: '', type: '' });

            const handleUpload = async (e) => {
                e.preventDefault();
                if (!file) {
                    setMsg({ text: 'Please select a file first.', type: 'error' });
                    return;
                }

                setLoading(true);
                setMsg({ text: '', type: '' });

                const fd = new FormData();
                fd.append('file', file);
                const token = localStorage.getItem('token');

                try {
                    const res = await fetch(API_URL + '/jobs/upload', {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${token}` },
                        body: fd
                    });
                    const data = await res.json();

                    if (res.ok) {
                        setMsg({ text: data.message, type: 'success' });
                        setFile(null);
                        e.target.reset(); // Reset file input
                    } else {
                        setMsg({ text: data.detail || 'Upload failed', type: 'error' });
                    }
                } catch (err) {
                    setMsg({ text: 'Network error occurred during upload', type: 'error' });
                }
                setLoading(false);
            };

            return (
                <div style={{ animation: 'fadeIn 0.5s ease' }}>
                    <h1 style={{ marginBottom: '2rem' }}>Ingest Data</h1>

                    <div className="card" style={{ maxWidth: 600 }}>
                        <h2 style={{ marginBottom: '0.5rem' }}>Upload Job CSV</h2>
                        <p style={{ marginBottom: '2rem', color: 'var(--text-secondary)', lineHeight: '1.5' }}>
                            Upload historical or new job listings containing descriptions.
                            The AI Engine will extract skills, map connections, and re-train the trending & forecast models automatically.
                            <br /><br />
                            <a href="/demo_jobs.csv" download style={{ color: 'var(--accent-primary)', textDecoration: 'none', fontWeight: 'bold' }}>✨ Download Demo Jobs File (demo_jobs.csv)</a>
                        </p>

                        {msg.text && (
                            <div style={{
                                background: msg.type === 'success' ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)',
                                border: `1px solid ${msg.type === 'success' ? 'rgba(16, 185, 129, 0.2)' : 'rgba(239, 68, 68, 0.2)'}`,
                                color: msg.type === 'success' ? '#34d399' : '#fca5a5',
                                padding: '1rem', borderRadius: '0.5rem', marginBottom: '1.5rem'
                            }}>
                                {msg.text}
                            </div>
                        )}

                        <form onSubmit={handleUpload}>
                            <div style={{
                                border: '2px dashed rgba(255,255,255,0.2)',
                                borderRadius: '1rem',
                                padding: '3rem 2rem',
                                textAlign: 'center',
                                marginBottom: '1.5rem',
                                background: 'rgba(0,0,0,0.1)'
                            }}>
                                <input type="file" id="fileUpload" accept=".csv" onChange={e => setFile(e.target.files[0])} style={{ display: 'none' }} />
                                <label htmlFor="fileUpload" style={{ cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                                    <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>📄</div>
                                    <span style={{ color: 'var(--accent-primary)', fontWeight: '600', fontSize: '1.1rem' }}>{file ? file.name : 'Click to Browse CSV'}</span>
                                </label>
                            </div>

                            <button className="btn" style={{ width: '100%' }} disabled={loading || !file}>
                                {loading ? 'Processing Pipeline...' : 'Run Extraction Pipeline'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function ResumeAnalyzer() {
            const [file, setFile] = useState(null);
            const [role, setRole] = useState('data scientist');
            const [customSkills, setCustomSkills] = useState('');
            const [results, setResults] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleUpload = async (e) => {
                e.preventDefault();
                if (!file) return;
                setLoading(true);

                const fd = new FormData();
                fd.append('file', file);
                if (role === 'custom') {
                    fd.append('custom_skills', customSkills);
                } else {
                    fd.append('custom_role', role);
                }

                const token = localStorage.getItem('token');
                try {
                    const res = await fetch(API_URL + '/resume/analyze', {
                        method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: fd
                    });
                    if (res.ok) setResults(await res.json());
                    else alert("Error analyzing resume");
                } catch (err) {
                    alert('Network Error');
                }
                setLoading(false);
            };

            return (
                <div style={{ animation: 'fadeIn 0.5s ease' }}>
                    <h1 style={{ marginBottom: '2rem' }}>Smart Resume Analyzer</h1>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(400px, 1fr))', gap: '2rem' }}>
                        <div className="card" style={{ alignSelf: 'start' }}>
                            <h2 style={{ marginBottom: '1rem' }}>Upload Profile</h2>
                            <form onSubmit={handleUpload}>
                                <label style={{ display: 'block', marginBottom: '0.5rem', color: 'var(--text-secondary)', fontSize: '0.9rem', fontWeight: 600 }}>Target Role / Template</label>
                                <select className="select-input" value={role} onChange={e => setRole(e.target.value)}>
                                    <option value="data scientist">Data Scientist</option>
                                    <option value="software engineer">Software Engineer</option>
                                    <option value="cloud architect">Cloud Architect</option>
                                    <option value="product manager">Product Manager</option>
                                    <option value="custom">-- Type Custom Required Skills --</option>
                                </select>

                                {role === 'custom' && (
                                    <div style={{ marginBottom: '1rem', animation: 'fadeIn 0.3s ease' }}>
                                        <label style={{ display: 'block', marginBottom: '0.5rem', color: 'var(--text-secondary)', fontSize: '0.9rem', fontWeight: 600 }}>Custom Required Skills (Comma separated)</label>
                                        <input type="text" className="form-input" style={{ marginBottom: 0 }} placeholder="e.g. rust, typescript, rest api"
                                            value={customSkills} onChange={e => setCustomSkills(e.target.value)} required />
                                    </div>
                                )}

                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '1rem', marginBottom: '0.5rem' }}>
                                    <label style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', fontWeight: 600 }}>Upload Resume (.txt/.pdf)</label>
                                    <a href="/demo_resume.txt" download style={{ color: 'var(--accent-primary)', textDecoration: 'none', fontSize: '0.8rem', fontWeight: 'bold' }}>📄 Demo Resume.txt</a>
                                </div>
                                <input type="file" className="form-input" accept=".txt,.pdf" onChange={e => setFile(e.target.files[0])} />

                                <button className="btn" style={{ width: '100%', marginTop: '1rem' }} disabled={loading || !file}>
                                    {loading ? 'Analyzing Profile...' : 'Calculate Gap Score'}
                                </button>
                            </form>
                        </div>

                        {loading && !results && <div className="card" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}><div className="loading-spinner"></div></div>}

                        {results && !loading && (
                            <div className="card" style={{ animation: 'fadeIn 0.4s ease' }}>
                                <h2 style={{ marginBottom: '1rem' }}>Analysis Results</h2>

                                <div style={{ display: 'flex', alignItems: 'center', gap: '2rem', marginBottom: '2rem', paddingBottom: '1.5rem', borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
                                    <div style={{
                                        width: '100px', height: '100px', borderRadius: '50%',
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        background: `conic-gradient(${results.score > 50 ? 'var(--success)' : 'var(--danger)'} ${results.score}%, rgba(255,255,255,0.05) 0)`,
                                        position: 'relative'
                                    }}>
                                        <div style={{
                                            width: '80px', height: '80px', borderRadius: '50%', background: 'rgb(25, 23, 56)',
                                            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.5rem', fontWeight: 'bold'
                                        }}>
                                            {results.score}%
                                        </div>
                                    </div>
                                    <div>
                                        <h3 style={{ fontSize: '1.5rem', marginBottom: '0.25rem' }}>Match Confidence</h3>
                                        <p style={{ color: 'var(--text-secondary)' }}>Assessing profile against: <b style={{ color: 'white' }}>{results.role_assessed}</b></p>
                                    </div>
                                </div>

                                <h4 style={{ marginBottom: '0.75rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '0.8rem' }}>✅ Matched Core Skills</h4>
                                <div style={{ marginBottom: '1.5rem' }}>
                                    {results.matched.map(s => <span className="badge badge-match" key={s}>{s}</span>)}
                                    {results.matched.length === 0 && <span style={{ color: 'rgba(255,255,255,0.3)', fontSize: '0.9rem' }}>None detected</span>}
                                </div>

                                <h4 style={{ marginBottom: '0.75rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '0.8rem' }}>❌ Missing Core Skills</h4>
                                <div style={{ marginBottom: '1.5rem' }}>
                                    {results.missing.map(s => <span className="badge badge-miss" key={s}>{s}</span>)}
                                    {results.missing.length === 0 && <span style={{ color: 'rgba(255,255,255,0.3)', fontSize: '0.9rem' }}>None</span>}
                                </div>

                                <div style={{ background: 'rgba(0,0,0,0.2)', padding: '1rem', borderRadius: '0.5rem', marginTop: '2rem' }}>
                                    <h4 style={{ marginBottom: '0.5rem', color: 'var(--text-secondary)', fontSize: '0.8rem' }}>Extracted Entities Log</h4>
                                    <p style={{ color: 'rgba(255,255,255,0.6)', fontSize: '0.85rem', lineHeight: '1.6' }}>
                                        {results.extracted_skills.join(', ') || 'No known skills identified in text.'}
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [view, setView] = useState('dashboard');

            const handleLogin = (t) => { setToken(t); localStorage.setItem('token', t); setView('dashboard'); };
            const handleLogout = () => { setToken(null); localStorage.removeItem('token'); };

            useEffect(() => {
                const style = document.createElement('style');
                style.innerHTML = `
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
          `;
                document.head.appendChild(style);
            }, []);

            if (!token) return <Login setToken={handleLogin} />;

            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '2rem' }}>
                            <div style={{ width: '32px', height: '32px', background: 'linear-gradient(45deg, #6366f1, #a855f7)', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 'bold' }}>S</div>
                            <h2 style={{ fontSize: '1.4rem' }}>SkillPulse</h2>
                        </div>

                        <div className={`sidebar-link ${view === 'dashboard' ? 'active' : ''}`} onClick={() => setView('dashboard')}>
                            📊 Analytics Dashboard
                        </div>
                        <div className={`sidebar-link ${view === 'upload' ? 'active' : ''}`} onClick={() => setView('upload')}>
                            📥 Ingest Job Data
                        </div>
                        <div className={`sidebar-link ${view === 'resume' ? 'active' : ''}`} onClick={() => setView('resume')}>
                            🧑‍💻 Profile Analyzer
                        </div>

                        <div style={{ flex: 1 }}></div>

                        <button className="sidebar-link" style={{ background: 'rgba(239, 68, 68, 0.1)', color: '#fca5a5', border: '1px solid rgba(239, 68, 68, 0.2)', textAlign: 'left', display: 'flex', alignItems: 'center', gap: '8px' }} onClick={handleLogout}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                            Sign Out
                        </button>
                    </div>

                    <div className="main-content">
                        {view === 'dashboard' && <Dashboard />}
                        {view === 'upload' && <UploadJob />}
                        {view === 'resume' && <ResumeAnalyzer />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
